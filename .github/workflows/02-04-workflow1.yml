name: Lint, Test, and Deploy on "push"

on:
  push:
    paths:
      - 'Code/02 Basics/04 Practice Project (Start)/**'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:

      - name: Get code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: cd "Code/02 Basics/04 Practice Project (Start)" && npm ci
      
      - name: Lint
        run: cd "Code/02 Basics/04 Practice Project (Start)" && npm run lint
      
      - name: Test code
        run: cd "Code/02 Basics/04 Practice Project (Start)" && npm run test

      - name: Build code  
        run: cd "Code/02 Basics/04 Practice Project (Start)" && npm run build

      - name: Deploy code
        run: echo "Deploying..."